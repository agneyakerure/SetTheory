<!doctype html><html><head><meta charset="utf-8"><title>SetTheory</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--g:#4ade80;--r:#f05252;--b:#60a5fa;--bg:#0c0c0e;--panel:#141418;--line:#26262e;--tx:#e8e8ec;--dim:#83838f}
body{background:var(--bg);color:var(--tx);font:14px/1.5 ui-sans-serif,-apple-system,"SF Pro Text",system-ui;padding-bottom:84px}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
header{display:flex;align-items:baseline;gap:14px;margin-bottom:26px}
h1{font-size:15px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.meta{color:var(--dim);font-size:12px}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
a{color:var(--dim);text-decoration:none;border-bottom:1px solid #333}
a:hover{color:var(--tx)}

/* picker */
.ask{color:var(--dim);font-size:19px;margin:44px 0 20px}
.picker{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.pick{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:26px 22px;text-align:left;transition:.14s}
.pick:hover{transform:translateY(-3px)}
.pick .dot{width:30px;height:30px;border-radius:50%;margin-bottom:16px}
.pick h2{font-size:19px;font-weight:600;margin-bottom:5px}
.pick p{color:var(--dim);font-size:12.5px;line-height:1.45}
.pick .n{color:var(--dim);font-size:12px;margin-top:14px;font-variant-numeric:tabular-nums}
.G .dot{background:var(--g)}.R .dot{background:var(--r)}.B .dot{background:var(--b)}
.G:hover{border-color:var(--g)}.R:hover{border-color:var(--r)}.B:hover{border-color:var(--b)}

/* zone */
.zone{display:grid;grid-template-columns:1.25fr 1fr;gap:22px;align-items:start}
.back{color:var(--dim);font-size:12.5px;margin-bottom:18px}
.zhead{display:flex;align-items:center;gap:11px;margin-bottom:4px}
.zhead .dot{width:13px;height:13px;border-radius:50%}
.zhead h2{font-size:21px;font-weight:600}
.sub{color:var(--dim);font-size:12.5px;margin-bottom:20px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px}
.ph{padding:12px 15px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.11em;
    text-transform:uppercase;color:var(--dim);display:flex;justify-content:space-between}

.cell{border-bottom:1px solid var(--line)}
.cell:last-child{border:none}
.cellh{display:flex;align-items:center;gap:10px;padding:8px 15px;background:#101014}
.tag{font-family:ui-monospace,Menlo,monospace;font-size:13px;font-weight:700;letter-spacing:1px;min-width:42px}
.cellh .c{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums}
.cell.empty .cellh{opacity:.34}
.cell.empty .why{color:var(--dim);font-size:11.5px;font-style:italic;padding:0 15px 8px;opacity:.8}
.trk{display:flex;align-items:center;gap:11px;padding:8px 15px;border-top:1px solid #1c1c22;cursor:pointer}
.trk:hover{background:#1a1a20}
.trk.on{background:#1e1e26}
.play{width:19px;color:var(--dim);font-size:10px;flex:0 0 19px}
.trk.on .play{color:var(--tx)}
.ti{flex:1;min-width:0}
.ti .t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13.5px}
.ti .a{color:var(--dim);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;flex:0 0 auto}
.bc{flex:0 0 auto;font-size:10px;color:#555;border:none}
.bc:hover{color:var(--b)}
.miss{opacity:.4}

/* labels */
.lab{padding:13px 15px;border-bottom:1px solid var(--line)}
.lab:last-child{border:none}
.lr{display:flex;align-items:center;gap:9px}
.lname{font-size:14px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cov{color:var(--dim);font-size:11px;font-variant-numeric:tabular-nums;flex:0 0 auto}
.chips{display:flex;gap:3px}
.chip{width:7px;height:7px;border-radius:50%;opacity:.85}
.status{display:flex;gap:5px;margin-top:9px}
.sb{font-size:10.5px;padding:3px 9px;border-radius:20px;border:1px solid var(--line);color:var(--dim)}
.sb.sel{background:var(--tx);color:#000;border-color:var(--tx);font-weight:600}
.nt{width:100%;margin-top:8px;background:#0d0d10;border:1px solid var(--line);border-radius:7px;
    color:var(--tx);padding:7px 9px;font:inherit;font-size:12.5px;resize:vertical;min-height:32px}
.nt::placeholder{color:#4a4a55}
.nt:focus{outline:none;border-color:#3a3a46}
.add{width:100%;padding:11px;color:var(--dim);font-size:12.5px;border-top:1px solid var(--line)}
.add:hover{color:var(--tx);background:#1a1a20}
.empty-note{padding:22px 15px;color:var(--dim);font-size:12.5px;line-height:1.6}

/* player */
.bar{position:fixed;bottom:0;left:0;right:0;background:#111116;border-top:1px solid var(--line);
     padding:11px 22px;display:none;align-items:center;gap:15px;backdrop-filter:blur(10px)}
.bar.on{display:flex}
.bar .now{flex:0 0 260px;min-width:0}
.bar .now .t{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .now .a{color:var(--dim);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
audio{flex:1;height:34px}
</style></head><body>
<div class="wrap" id="app"></div>
<div class="bar" id="bar">
  <div class="now"><div class="t" id="nt"></div><div class="a" id="na"></div></div>
  <audio id="au" controls></audio>
</div>
<script>
const HEX={Green:'#4ade80',Red:'#f05252',Blue:'#60a5fa'};
const BLURB={Green:'fun and light',Red:'energetic — peak time',Blue:'deep, meditative, everything else'};
const CLS={Green:'G',Red:'R',Blue:'B'};
let D=null,S=null,view=null,playing=null,CUR=[];

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const $=id=>document.getElementById(id);

async function boot(){
  D=await (await fetch('/api/data')).json();
  S=await (await fetch('/api/state')).json();
  render();
}
async function put(name,patch){
  const r=await fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,...patch})});
  S.labels[name]=await r.json();
}
function rec(n){return S.labels[n]||{status:'none',colors:[],notes:'',url:null,added:false};}

function labelsFor(color){
  const out=D.labels.filter(l=>l.colors[color]).map(l=>({...l,n:l.colors[color]}));
  for(const [name,r] of Object.entries(S.labels))
    if(r.added && (r.colors||[]).includes(color) && !out.find(x=>x.name===name))
      out.push({name,url:r.url,via:null,colors:{},tracks:[],releases:0,n:0,source:'added'});
  return out.sort((a,b)=>b.n-a.n||a.name.localeCompare(b.name));
}

function render(){
  const app=$('app');
  if(!view){
    app.innerHTML=`<header><h1>SetTheory</h1><span class="meta">${D.tracks.length} tracks · ${D.labels.length} labels · built ${D.built}</span></header>
    <div class="ask">What are you feeling?</div>
    <div class="picker">${D.colors.map(c=>`
      <button class="pick ${CLS[c]}" onclick="go('${c}')">
        <div class="dot"></div><h2>${c}</h2><p>${BLURB[c]}</p>
        <div class="n">${D.tracks.filter(t=>t.color===c).length} tracks · ${labelsFor(c).length} labels</div>
      </button>`).join('')}</div>`;
    return;
  }
  const c=view, mine=D.tracks.filter(t=>t.color===c), labs=labelsFor(c);
  CUR=labs;
  const cells=D.energy.map(e=>{
    const ts=mine.filter(t=>t.energy===e);
    const notes=[...new Set(ts.map(t=>t.note).filter(Boolean))];
    return `<div class="cell ${ts.length?'':'empty'}">
      <div class="cellh"><span class="tag" style="color:${HEX[c]}">${e}</span>
        <span class="c">${ts.length||'—'}</span>
        ${notes.length?`<span class="c">· ${notes.map(esc).join(', ')}</span>`:''}</div>
      ${ts.length?ts.map(t=>`
        <div class="trk ${playing===t.id?'on':''} ${t.exists?'':'miss'}" onclick="play(${t.id})">
          <span class="play">${playing===t.id?'▮▮':'▶'}</span>
          <div class="ti"><div class="t">${esc(t.title)||'<span style="color:#555">untitled file</span>'}</div>
            <div class="a">${esc(t.artist)||'unknown'}${t.label?' · '+esc(t.label):''}</div></div>
          <span class="st">${t.bpm?Math.round(t.bpm):''}${t.key?' · '+esc(t.key):''}</span>
          ${t.bc_url?`<a class="bc" href="${t.bc_url}" target="_blank" onclick="event.stopPropagation()">BC</a>`:''}
        </div>`).join('')
      :`<div class="why">nothing here — your ${c.toLowerCase()} music doesn't go this ${e.startsWith('+')?'fast':'dark'}</div>`}
    </div>`}).join('');

  app.innerHTML=`<header><h1>SetTheory</h1><span class="meta">${D.built}</span></header>
  <button class="back" onclick="go(null)">← all colors</button>
  <div class="zhead"><span class="dot" style="background:${HEX[c]}"></span><h2>${c}</h2></div>
  <div class="sub">${BLURB[c]} · ${mine.length} tracks you own · ${labs.length} labels live here</div>
  <div class="zone">
    <div class="panel"><div class="ph"><span>What you already have</span><span>listen — is this today?</span></div>${cells}</div>
    <div class="panel"><div class="ph"><span>Where this vibe lives</span><span>${labs.length}</span></div>
      ${labs.length?labs.map((l,i)=>card(l,i)).join(''):'<div class="empty-note">No labels yet in this zone.</div>'}
      <button class="add" onclick="addLabel('${c}')">+ add a label you want to explore</button>
    </div>
  </div>`;
}

function card(l,i){
  const r=rec(l.name), st=r.status||'none';
  const chips=Object.keys(l.colors).map(k=>`<span class="chip" style="background:${HEX[k]}"></span>`).join('');
  const trk=l.n?`${l.n} track${l.n>1?'s':''}`:'';
  const walk=l.releases?`${l.owned} of ${l.releases} releases`:'';
  const cov=[trk,walk].filter(Boolean).join(' · ')||'not started';
  const href=r.url||l.url||l.via;
  return `<div class="lab">
    <div class="lr">
      ${href?`<a class="lname" href="${esc(href)}" target="_blank">${esc(l.name)} ↗</a>`
            :`<span class="lname">${esc(l.name)}</span>`}
      <span class="chips">${chips}</span><span class="cov">${cov}</span>
    </div>
    <div class="status">
      ${[['none','never'],['dipped','dipped in'],['walked','walked it']].map(([k,lb])=>
        `<button class="sb ${st===k?'sel':''}" onclick="setStatus(${i},'${k}')">${lb}</button>`).join('')}
    </div>
    <textarea class="nt" placeholder="notes — what does this label sound like? where were you going next?"
      onblur="setNotes(${i},this.value)">${esc(r.notes)}</textarea>
  </div>`;
}

async function setStatus(i,s){await put(CUR[i].name,{status:s});render();}
async function setNotes(i,v){const n=CUR[i].name; if(rec(n).notes===v)return; await put(n,{notes:v});}
async function addLabel(c){
  const name=prompt('Label name?'); if(!name)return;
  const url=prompt('Bandcamp URL? (optional)')||null;
  const r=rec(name), cols=[...new Set([...(r.colors||[]),c])];
  await put(name,{colors:cols,url,added:true,status:r.status||'none'});
  render();
}
function go(c){view=c;window.scrollTo(0,0);render();}
function play(id){
  const t=D.tracks.find(x=>x.id===id);
  if(!t.exists){alert('That file is no longer on disk.');return;}
  playing=id;
  $('bar').classList.add('on');
  $('nt').textContent=t.title||'untitled';
  $('na').textContent=(t.artist||'unknown')+(t.label?' · '+t.label:'');
  const au=$('au'); au.src='/audio?id='+id; au.play().catch(()=>{});
  render();
}
$('au').addEventListener('ended',()=>{playing=null;render();});
boot();
</script></body></html>
